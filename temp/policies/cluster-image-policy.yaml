apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-signed-images
spec:
  images:
  - glob: "**"
  authorities:
  - key:
      hashAlgorithm: sha256
      data: |
        -----BEGIN PUBLIC KEY-----
        MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEH7faSZ4OtbF6Gxz83rHFq58Buzoj
        uQyp2CZB0Z7twurhNRojCNOYO+Rc17kmGPyeRBvVulo0QRhsEZSF8VDveg==
        -----END PUBLIC KEY-----
  mode: enforce
