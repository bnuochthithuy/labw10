apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-db-credentials
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: password
    remoteRef:
      key: labw10/api/db
      property: password
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
