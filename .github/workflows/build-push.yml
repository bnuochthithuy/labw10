# Build, scan, push, and sign the API image.
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'temp/src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api
  IMAGE: ghcr.io/${{ github.repository_owner }}/w10-api:${{ github.sha }}

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build image
        run: |
          docker build -t "$IMAGE" ./temp/src/api

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.4

      - name: Trivy scan
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL "$IMAGE"

      - name: Check Cosign secrets
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          test -n "$COSIGN_PRIVATE_KEY"
          test -n "$COSIGN_PASSWORD"

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Push image
        run: |
          docker push "$IMAGE"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          trap 'rm -f cosign.key' EXIT
          printf "%s" "$COSIGN_PRIVATE_KEY" > cosign.key
          mkdir -p signing
          cosign public-key --key cosign.key > signing/cosign.pub
          cosign sign --yes --key cosign.key "$IMAGE"

      - name: Update manifests with signed image and public key
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          PUBLIC_KEY_BLOCK="$(sed 's/^/        /' signing/cosign.pub)"
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: $IMAGE|g" temp/app-api/rollout.yaml
          sed -i "/- name: VERSION/{n;s|value: \".*\"|value: \"sha-$SHORT_SHA\"|;}" temp/app-api/rollout.yaml
          perl -0pi -e 's/(metadata:\n  name: demo\n)(?!  labels:\n)/$1  labels:\n    policy.sigstore.dev\/include: "true"\n/' temp/app-common/demo-namespace.yaml
          awk -v public_key="$PUBLIC_KEY_BLOCK" '
            /^      data: \|/ { print; print public_key; in_key = 1; next }
            in_key && /^  mode:/ { in_key = 0; print; next }
            !in_key { print }
          ' temp/policies/cluster-image-policy.yaml > temp/policies/cluster-image-policy.yaml.tmp
          mv temp/policies/cluster-image-policy.yaml.tmp temp/policies/cluster-image-policy.yaml

      - name: Commit and push signed image update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add temp/app-api/rollout.yaml temp/app-common/demo-namespace.yaml temp/policies/cluster-image-policy.yaml signing/cosign.pub
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: deploy signed image ${GITHUB_SHA::7} [skip ci]"
            git push
          fi
