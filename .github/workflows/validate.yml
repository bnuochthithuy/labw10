# CI validate Kubernetes manifests.
name: validate

on:
  pull_request:
    paths:
      - 'temp/app-api/**'
      - 'temp/app-analysis/**'
      - 'temp/app-alert/**'
      - 'temp/app-common/**'
      - 'temp/argocd/**'
      - 'temp/rbac/**'
      - 'temp/gatekeeper/**'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            temp/app-api/ temp/app-analysis/ temp/app-alert/ temp/app-common/ \
            temp/argocd/ temp/rbac/ temp/gatekeeper/
